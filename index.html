<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CS퀴즈">
<meta name="theme-color" content="#0f172a">
<title>CS 면접 퀴즈</title>
<link rel="manifest" href="manifest.json">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --blue: #3b82f6;
    --blue-dim: #1d4ed8;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --purple: #a855f7;
    --orange: #f97316;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
  }

  body { padding-bottom: env(safe-area-inset-bottom); }

  #app { min-height: 100vh; display: flex; flex-direction: column; }

  /* ── 공통 ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: .65rem 1.2rem; border-radius: .5rem; border: none;
    font-size: .95rem; font-weight: 600; cursor: pointer;
    transition: opacity .15s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(.96); }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:disabled { background: var(--surface2); color: var(--muted); cursor: default; transform: none; }
  .btn-ghost { background: var(--surface2); color: var(--text); }
  .btn-sm { padding: .4rem .8rem; font-size: .82rem; }

  .chip {
    display: inline-flex; align-items: center; gap: .3rem;
    padding: .3rem .65rem; border-radius: 999px; font-size: .75rem;
    font-weight: 600; border: 2px solid transparent; cursor: pointer;
    transition: border-color .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .chip.active { border-color: var(--blue); }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; flex: 1; animation: fadeIn .2s; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ────────────────────────────────── HOME ── */
  #homeScreen { padding: 1.5rem 1rem; gap: 1.5rem; max-width: 480px; margin: 0 auto; width: 100%; }

  .home-header { text-align: center; }
  .home-header h1 { font-size: 1.6rem; font-weight: 800; }
  .home-header p { color: var(--muted); font-size: .85rem; margin-top: .3rem; }

  .card { background: var(--surface); border-radius: .75rem; padding: 1rem; }
  .card-title { font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .75rem; }

  /* 주제 선택 */
  .topic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
  .topic-btn {
    padding: .6rem; border-radius: .5rem; border: 2px solid transparent;
    background: var(--surface2); cursor: pointer; text-align: center;
    font-size: .82rem; font-weight: 600; color: var(--text);
    transition: border-color .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .topic-btn.active { border-color: var(--blue); background: #1e3a5f; }
  .topic-btn .count { font-size: .7rem; color: var(--muted); font-weight: 400; }

  /* 필터 행 */
  .filter-row { display: flex; flex-wrap: wrap; gap: .4rem; }
  .chip-diff.basic    { background: #052e16; color: #4ade80; }
  .chip-diff.intermediate { background: #1c1917; color: #fb923c; }
  .chip-diff.advanced { background: #2d1b1b; color: #f87171; }
  .chip-type.concept  { background: #172554; color: #93c5fd; }
  .chip-type.tradeoff { background: #431407; color: #fdba74; }
  .chip-type.scenario { background: #2e1065; color: #d8b4fe; }
  .chip-type.debug    { background: #2d1b1b; color: #fca5a5; }
  .chip-type.ordering { background: #1c1917; color: #fde047; }

  /* 문제 수 */
  .count-row { display: flex; align-items: center; gap: .75rem; }
  .count-row input[type=range] { flex: 1; accent-color: var(--blue); }
  .count-badge { font-weight: 700; color: var(--blue); min-width: 2.5rem; text-align: right; }

  /* 통계 */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .5rem; text-align: center; }
  .stat-item .num { font-size: 1.4rem; font-weight: 800; color: var(--blue); }
  .stat-item .label { font-size: .72rem; color: var(--muted); }

  /* ────────────────────────────────── QUIZ ── */
  #quizScreen { padding: 1rem; max-width: 480px; margin: 0 auto; width: 100%; }

  .progress-bar {
    height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 1rem;
  }
  .progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .3s; }

  .quiz-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
  .quiz-counter { font-size: .8rem; color: var(--muted); }

  .question-card {
    background: var(--surface); border-radius: .75rem; padding: 1.1rem;
    margin-bottom: 1rem; line-height: 1.6; font-size: .95rem;
  }
  .question-card p,
  .explanation p,
  .wrong-q p { margin-bottom: .7rem; }
  .question-card p:last-child,
  .explanation p:last-child,
  .wrong-q p:last-child { margin-bottom: 0; }
  .question-card pre,
  .explanation pre,
  .wrong-q pre {
    margin: .75rem 0; padding: .8rem; border-radius: .5rem;
    background: #020617; border: 1px solid var(--surface2);
    overflow-x: auto; line-height: 1.5;
  }
  .question-card code,
  .explanation code,
  .wrong-q code {
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
    font-size: .82rem;
  }
  .question-card :not(pre) > code,
  .explanation :not(pre) > code,
  .wrong-q :not(pre) > code {
    padding: .1rem .3rem; border-radius: .3rem;
    background: var(--surface2); color: #e2e8f0;
  }

  .options { display: flex; flex-direction: column; gap: .55rem; }
  .option {
    padding: .8rem 1rem; border-radius: .6rem; border: 2px solid var(--surface2);
    background: var(--surface); cursor: pointer; font-size: .9rem; line-height: 1.5;
    transition: border-color .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .option:not(.disabled):hover { border-color: var(--blue); }
  .option.selected  { border-color: var(--blue); background: #1e3a5f; }
  .option.correct   { border-color: var(--green); background: #052e16; }
  .option.wrong     { border-color: var(--red); background: #2d1b1b; }
  .option.reveal    { border-color: var(--green); background: #052e16; }
  .option.disabled  { cursor: default; }

  .explanation {
    background: var(--surface); border-left: 3px solid var(--blue);
    border-radius: .5rem; padding: .85rem 1rem; font-size: .85rem;
    line-height: 1.6; color: var(--muted); margin-bottom: 1rem;
    animation: fadeIn .2s;
  }

  .quiz-actions { display: flex; gap: .6rem; }
  .quiz-actions .btn { flex: 1; }

  /* ────────────────────────────────── RESULT ── */
  #resultScreen { padding: 1.5rem 1rem; gap: 1.25rem; max-width: 480px; margin: 0 auto; width: 100%; }

  .score-circle {
    width: 120px; height: 120px; border-radius: 50%;
    border: 6px solid var(--blue); display: flex; flex-direction: column;
    align-items: center; justify-content: center; margin: 0 auto;
  }
  .score-circle .pct { font-size: 1.8rem; font-weight: 800; }
  .score-circle .sub { font-size: .75rem; color: var(--muted); }

  .type-row { display: flex; justify-content: space-between; align-items: center; padding: .3rem 0; border-bottom: 1px solid var(--surface2); }
  .type-row:last-child { border-bottom: none; }
  .type-row .bar-bg { flex: 1; margin: 0 .75rem; height: 6px; background: var(--surface2); border-radius: 3px; }
  .type-row .bar-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width .4s; }
  .type-row .pct { font-size: .8rem; color: var(--muted); min-width: 2.5rem; text-align: right; }

  .wrong-item { background: var(--surface); border-radius: .6rem; padding: .85rem; margin-bottom: .5rem; font-size: .85rem; }
  .wrong-q { margin-bottom: .5rem; line-height: 1.5; }
  .wrong-ans { font-size: .8rem; }
  .wrong-ans .correct-text { color: var(--green); }
  .wrong-ans .your-text    { color: var(--red); }

  /* ────────────────────────────────── STUDY ── */
  .home-actions { display: flex; flex-direction: column; gap: .65rem; }
  .home-actions .btn { width: 100%; padding: .85rem; font-size: 1.02rem; }

  #studyScreen,
  #studyCategoryScreen,
  #studyArticleListScreen,
  #studyArticleScreen {
    padding: 1rem; gap: 1rem; max-width: 640px; margin: 0 auto; width: 100%;
  }

  .topbar {
    position: sticky; top: 0; z-index: 3;
    display: grid; grid-template-columns: 2.6rem 1fr 2.6rem; align-items: center; gap: .5rem;
    padding: .4rem 0 .7rem; background: var(--bg);
  }
  .icon-btn {
    width: 2.4rem; height: 2.4rem; border: 1px solid var(--border); border-radius: .5rem;
    background: var(--surface); color: var(--text); font-size: 1.05rem; font-weight: 700;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .icon-btn:active { transform: scale(.96); }
  .topbar-title { min-width: 0; text-align: center; }
  .topbar-title strong { display: block; font-size: .98rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar-title span { display: block; margin-top: .12rem; color: var(--muted); font-size: .74rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .study-list { display: flex; flex-direction: column; gap: .55rem; }
  .study-row {
    width: 100%; min-height: 4.4rem; display: grid; grid-template-columns: 1fr auto; gap: .75rem;
    align-items: center; padding: .85rem .95rem; border: 1px solid var(--border); border-radius: .5rem;
    background: var(--surface); color: var(--text); text-align: left; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .study-row:active { transform: scale(.99); }
  .study-row-title { display: block; font-size: .98rem; font-weight: 800; line-height: 1.35; }
  .study-row-meta { display: block; margin-top: .25rem; color: var(--muted); font-size: .78rem; line-height: 1.35; }
  .study-row-mark { color: var(--green); font-size: 1.1rem; font-weight: 800; }
  .study-empty {
    padding: 1rem; border: 1px dashed var(--border); border-radius: .5rem;
    color: var(--muted); line-height: 1.65; background: rgba(30, 41, 59, .55);
  }
  .study-toolbar { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }
  .study-toolbar .btn { width: 100%; }

  .article-header {
    display: flex; flex-direction: column; gap: .45rem; padding-bottom: .75rem;
    border-bottom: 1px solid var(--surface2);
  }
  .article-kicker { color: var(--green); font-size: .78rem; font-weight: 800; }
  .article-title { font-size: 1.35rem; line-height: 1.35; letter-spacing: 0; }
  .article-meta { color: var(--muted); font-size: .78rem; line-height: 1.4; }
  .article-body {
    font-size: .97rem; line-height: 1.78; color: #e5edf8; overflow-wrap: anywhere;
  }
  .article-body h1,
  .article-body h2,
  .article-body h3,
  .article-body h4 {
    margin: 1.35rem 0 .55rem; line-height: 1.35; letter-spacing: 0; color: var(--text);
  }
  .article-body h1 { font-size: 1.25rem; }
  .article-body h2 { font-size: 1.16rem; }
  .article-body h3 { font-size: 1.06rem; }
  .article-body h4 { font-size: .98rem; color: #bfdbfe; }
  .article-body p { margin: .7rem 0; }
  .article-body ul,
  .article-body ol { margin: .65rem 0 .8rem; padding-left: 1.2rem; }
  .article-body li { margin: .28rem 0; }
  .article-body blockquote {
    margin: .85rem 0; padding: .75rem .9rem; border-left: 3px solid var(--green);
    border-radius: .4rem; background: rgba(21, 128, 61, .14); color: #dbeafe;
  }
  .article-body pre {
    margin: .85rem 0; padding: .85rem; border-radius: .5rem;
    background: #020617; border: 1px solid var(--surface2);
    overflow-x: auto; line-height: 1.55;
  }
  .article-body code {
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace; font-size: .86rem;
  }
  .article-body :not(pre) > code {
    padding: .1rem .3rem; border-radius: .3rem; background: var(--surface2); color: #f8fafc;
  }
  .article-body table {
    display: block; width: 100%; margin: .85rem 0; border-collapse: collapse; overflow-x: auto;
    white-space: nowrap;
  }
  .article-body th,
  .article-body td {
    padding: .5rem .6rem; border: 1px solid var(--border); text-align: left; vertical-align: top;
  }
  .article-body th { color: #bfdbfe; background: rgba(51, 65, 85, .8); }
  .article-body a { color: #93c5fd; }
</style>
</head>
<body>
<div id="app">

  <!-- ═══════════════════ HOME ═══════════════════ -->
  <div id="homeScreen" class="screen active">
    <div class="home-header">
      <h1>💻 CS 면접 퀴즈</h1>
      <p>기술 면접을 대비하는 퀴즈 앱</p>
    </div>

    <!-- 통계 -->
    <div class="card">
      <div class="card-title">📊 내 통계</div>
      <div class="stat-grid">
        <div class="stat-item"><div class="num" id="statTotal">0</div><div class="label">총 시도</div></div>
        <div class="stat-item"><div class="num" id="statCorrect">0</div><div class="label">정답</div></div>
        <div class="stat-item"><div class="num" id="statPct">0%</div><div class="label">정답률</div></div>
      </div>
    </div>

    <!-- 주제 선택 -->
    <div class="card">
      <div class="card-title">📚 주제 선택 <span style="color:var(--blue);font-weight:400;font-size:.75rem;">(복수 선택 가능)</span></div>
      <div class="topic-grid" id="topicGrid"></div>
    </div>

    <!-- 난이도 -->
    <div class="card">
      <div class="card-title">🎯 난이도</div>
      <div class="filter-row" id="diffFilter">
        <div class="chip chip-diff basic active" data-diff="basic">🟢 기초</div>
        <div class="chip chip-diff intermediate active" data-diff="intermediate">🟠 중급</div>
        <div class="chip chip-diff advanced active" data-diff="advanced">🔴 고급</div>
      </div>
    </div>

    <!-- 문제 유형 -->
    <div class="card">
      <div class="card-title">🏷️ 문제 유형</div>
      <div class="filter-row" id="typeFilter">
        <div class="chip chip-type concept active" data-type="concept">🔵 개념</div>
        <div class="chip chip-type tradeoff active" data-type="tradeoff">🟠 트레이드오프</div>
        <div class="chip chip-type scenario active" data-type="scenario">🟣 시나리오</div>
        <div class="chip chip-type debug active" data-type="debug">🔴 디버그</div>
        <div class="chip chip-type ordering active" data-type="ordering">🟡 순서</div>
      </div>
    </div>

    <!-- 문제 수 -->
    <div class="card">
      <div class="card-title">🔢 문제 수</div>
      <div class="count-row">
        <input type="range" id="countSlider" min="5" max="50" step="5" value="10">
        <span class="count-badge" id="countLabel">10문제</span>
      </div>
    </div>

    <div class="home-actions">
      <button class="btn btn-primary" id="startBtn">퀴즈 시작</button>
      <button class="btn btn-ghost" id="openStudyBtn">학습 자료 보기</button>
    </div>
  </div>

  <!-- ═══════════════════ QUIZ ═══════════════════ -->
  <div id="quizScreen" class="screen">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="quiz-meta">
      <span class="quiz-counter" id="quizCounter">1 / 10</span>
      <div id="typeBadge" class="chip chip-type concept">🔵 개념</div>
    </div>
    <div class="question-card" id="questionText"></div>
    <div class="options" id="optionList"></div>
    <div class="explanation" id="explanationBox" style="display:none;"></div>
    <div class="quiz-actions">
      <button class="btn btn-ghost" id="quitBtn">그만두기</button>
      <button class="btn btn-primary" id="nextBtn" style="display:none;" >다음 문제 →</button>
    </div>
  </div>

  <!-- ═══════════════════ RESULT ═══════════════════ -->
  <div id="resultScreen" class="screen">
    <div class="home-header">
      <h1 id="resultEmoji">🎉</h1>
      <p id="resultMessage"></p>
    </div>
    <div class="score-circle">
      <span class="pct" id="resultPct">0%</span>
      <span class="sub" id="resultScore">0/0</span>
    </div>
    <!-- 유형별 정답률 -->
    <div class="card" id="typeStatsCard">
      <div class="card-title">유형별 정답률</div>
      <div id="typeStatsList"></div>
    </div>
    <!-- 틀린 문제 -->
    <div id="wrongCard" class="card" style="display:none;">
      <div class="card-title">❌ 틀린 문제 복습</div>
      <div id="wrongList"></div>
    </div>
    <button class="btn btn-primary" id="retryBtn" style="padding:.85rem;">다시 풀기</button>
    <button class="btn btn-ghost" id="homeBtn">홈으로</button>
  </div>

  <!-- ═══════════════════ STUDY TOPICS ═══════════════════ -->
  <div id="studyScreen" class="screen">
    <div class="topbar">
      <button class="icon-btn" id="studyHomeBtn" aria-label="홈으로">←</button>
      <div class="topbar-title">
        <strong>학습 자료</strong>
        <span>파트를 선택하세요</span>
      </div>
      <span></span>
    </div>
    <div class="study-list" id="studyTopicList"></div>
  </div>

  <!-- ═══════════════════ STUDY CATEGORIES ═══════════════════ -->
  <div id="studyCategoryScreen" class="screen">
    <div class="topbar">
      <button class="icon-btn" id="studyCategoryBackBtn" aria-label="학습 자료로">←</button>
      <div class="topbar-title">
        <strong id="studyCategoryTitle">파트</strong>
        <span id="studyCategoryMeta">소분류</span>
      </div>
      <span></span>
    </div>
    <div class="study-list" id="studyCategoryList"></div>
    <div class="study-toolbar">
      <button class="btn btn-ghost" id="studyCategoryQuizBtn">파트 퀴즈</button>
      <button class="btn btn-ghost" id="studyCategoryHomeBtn">홈으로</button>
    </div>
  </div>

  <!-- ═══════════════════ STUDY ARTICLES ═══════════════════ -->
  <div id="studyArticleListScreen" class="screen">
    <div class="topbar">
      <button class="icon-btn" id="studyArticleListBackBtn" aria-label="소분류로">←</button>
      <div class="topbar-title">
        <strong id="studyArticleListTitle">소분류</strong>
        <span id="studyArticleListMeta">글 목록</span>
      </div>
      <span></span>
    </div>
    <div class="study-list" id="studyArticleList"></div>
  </div>

  <!-- ═══════════════════ STUDY ARTICLE ═══════════════════ -->
  <div id="studyArticleScreen" class="screen">
    <div class="topbar">
      <button class="icon-btn" id="studyArticleBackBtn" aria-label="글 목록으로">←</button>
      <div class="topbar-title">
        <strong id="studyArticleTopTitle">글</strong>
        <span id="studyArticleTopMeta">학습 자료</span>
      </div>
      <span></span>
    </div>
    <article class="article-header">
      <span class="article-kicker" id="studyArticleKicker"></span>
      <h1 class="article-title" id="studyArticleTitle"></h1>
      <span class="article-meta" id="studyArticleMeta"></span>
      <button class="btn btn-primary" id="studyArticleQuizBtn">이 파트 퀴즈 풀기</button>
    </article>
    <div class="article-body" id="studyArticleBody"></div>
  </div>

</div>

<script>
// ─── 설정 ───────────────────────────────────────────────────────────────────
const BASE_URL = './data';
const CONTENT_MANIFEST_URL = './content/manifest.json';
const TOPICS = [
  { key: 'os',      label: '운영체제' },
  { key: 'network', label: '네트워크' },
  { key: 'ds',      label: '자료구조' },
  { key: 'db',      label: '데이터베이스' },
  { key: 'java',    label: 'Java' },
  { key: 'spring',  label: 'Spring' },
  { key: 'design',  label: '디자인패턴' },
  { key: 'general', label: '개발자 필수' },
];
const TYPE_META = {
  concept:  { icon: '🔵', label: '개념' },
  tradeoff: { icon: '🟠', label: '트레이드오프' },
  scenario: { icon: '🟣', label: '시나리오' },
  debug:    { icon: '🔴', label: '디버그' },
  ordering: { icon: '🟡', label: '순서' },
};

let topicCounts  = {};        // { os: 30, ... }

let selectedDiffs  = new Set(['basic','intermediate','advanced']);
let selectedTypes  = new Set(['concept','tradeoff','scenario','debug','ordering']);
let countTarget = 10;

let quiz = { questions: [], idx: 0, correct: 0, wrongs: [], answered: false };
let learningNotes = [];
let noteCache = {};
let currentNote = null;
let currentCategory = null;

async function loadAll() {
  try {
    const res = await Promise.all(
      TOPICS.map(t =>
        fetch(`${BASE_URL}/${t.key}.json`)
          .then(r => r.json())
          .catch(() => ({ topic: t.key, questions: [] }))
      )
    );
    allQuestions = res.flatMap(r => {
      topicCounts[r.topic] = (r.questions || []).length;
      return r.questions || [];
    });
    localStorage.setItem('cached-questions', JSON.stringify(allQuestions));
    localStorage.setItem('cached-counts',    JSON.stringify(topicCounts));
  } catch {
    const cached = localStorage.getItem('cached-questions');
    const counts = localStorage.getItem('cached-counts');
    if (cached) allQuestions = JSON.parse(cached);
    if (counts)  topicCounts  = JSON.parse(counts);
  }
  renderTopicGrid();
  updateStartBtn();
  renderStudyTopics();
}

// ─── 홈 렌더 ─────────────────────────────────────────────────────────────────
function renderTopicGrid() {
  const grid = document.getElementById('topicGrid');
  grid.innerHTML = TOPICS.map(t => {
    const n = topicCounts[t.key] || 0;
    const active = selectedTopics.has(t.key) ? 'active' : '';
    return `<button class="topic-btn ${active}" data-key="${t.key}">
      ${t.label}<br><span class="count">${n}문제</span>
    </button>`;
  }).join('');
  grid.querySelectorAll('.topic-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.dataset.key;
      if (selectedTopics.has(k)) { selectedTopics.delete(k); btn.classList.remove('active'); }
      else                       { selectedTopics.add(k);    btn.classList.add('active');    }
      updateStartBtn();
    });
  });
}

function updateStartBtn() {
  const available = getFiltered();
  const btn = document.getElementById('startBtn');
  btn.textContent = available.length > 0
    ? `퀴즈 시작 (${Math.min(countTarget, available.length)}문제)`
    : '문제가 없습니다';
  btn.disabled = available.length === 0;
}

function getFiltered() {
  return allQuestions.filter(q =>
    selectedTopics.has(q.id.split('-')[0]) &&
    selectedDiffs.has(q.difficulty) &&
    selectedTypes.has(q.type)
  );
}

function renderStats() {

  document.getElementById('statTotal').textContent = s.total;
  document.getElementById('statCorrect').textContent = s.correct;
  document.getElementById('statPct').textContent = s.total ? Math.round(s.correct/s.total*100)+'%' : '0%';

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function escapeHtml(value = '') {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeAttr(value = '') {
  return escapeHtml(value).replace(/`/g, '&#96;');
}

function renderInlineMarkdown(value = '') {
  return escapeHtml(value)
    .replace(/`([^`\n]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\[([^\]\n]+)\]\((https?:\/\/[^)\s]+|\.\/[^)\s]+|\/[^)\s]+|#[^)\s]+|about:blank#[^)\s]+)\)/g,
      (_, text, href) => `<a href="${escapeAttr(href)}" target="_blank" rel="noopener noreferrer">${text}</a>`);
}

function renderTable(lines) {
  const rows = lines
    .filter(line => !/^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line))
    .map(line => line.trim().replace(/^\||\|$/g, '').split('|').map(cell => cell.trim()));
  if (!rows.length) return '';
  const head = rows[0];
  const body = rows.slice(1);
  return `<table><thead><tr>${head.map(cell => `<th>${renderInlineMarkdown(cell)}</th>`).join('')}</tr></thead>` +
    `<tbody>${body.map(row => `<tr>${row.map(cell => `<td>${renderInlineMarkdown(cell)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

function renderMarkdown(value = '') {
  const blocks = String(value).replace(/\r\n/g, '\n').replace(/<!--[\s\S]*?-->/g, '')
    .split(/(```[\w-]*\n[\s\S]*?\n```)/g);
  return blocks.map(block => {
    const codeMatch = block.match(/^```([\w-]*)\n([\s\S]*?)\n```$/);
    if (codeMatch) {
      const lang = codeMatch[1] ? ` language-${escapeHtml(codeMatch[1])}` : '';
      return `<pre><code class="${lang.trim()}">${escapeHtml(codeMatch[2])}</code></pre>`;
    }
    const out = [];
    const lines = block.split('\n');
    let paragraph = [];
    let listType = null;
    let tableLines = [];

    const flushParagraph = () => {
      if (!paragraph.length) return;
      out.push(`<p>${renderInlineMarkdown(paragraph.join(' '))}</p>`);
      paragraph = [];
    };
    const closeList = () => {
      if (!listType) return;
      out.push(`</${listType}>`);
      listType = null;
    };
    const flushTable = () => {
      if (!tableLines.length) return;
      out.push(renderTable(tableLines));
      tableLines = [];
    };

    lines.forEach(line => {
      const raw = line.replace(/\s+$/, '');
      const trimmed = raw.trim();

      if (!trimmed) {
        flushParagraph();
        closeList();
        flushTable();
        return;
      }

      if (trimmed.startsWith('|') && trimmed.includes('|')) {
        flushParagraph();
        closeList();
        tableLines.push(trimmed);
        return;
      }

      flushTable();

      const heading = trimmed.match(/^(#{1,4})\s+(.+)$/);
      if (heading) {
        flushParagraph();
        closeList();
        const level = heading[1].length;
        out.push(`<h${level}>${renderInlineMarkdown(heading[2])}</h${level}>`);
        return;
      }

      if (/^---+$/.test(trimmed)) {
        flushParagraph();
        closeList();
        out.push('<hr>');
        return;
      }

      const quote = trimmed.match(/^>\s?(.+)$/);
      if (quote) {
        flushParagraph();
        closeList();
        out.push(`<blockquote>${renderInlineMarkdown(quote[1])}</blockquote>`);
        return;
      }

      const unordered = raw.match(/^\s*[-*]\s+(.+)$/);
      if (unordered) {
        flushParagraph();
        if (listType !== 'ul') { closeList(); out.push('<ul>'); listType = 'ul'; }
        out.push(`<li>${renderInlineMarkdown(unordered[1])}</li>`);
        return;
      }

      const ordered = raw.match(/^\s*\d+\.\s+(.+)$/);
      if (ordered) {
        flushParagraph();
        if (listType !== 'ol') { closeList(); out.push('<ol>'); listType = 'ol'; }
        out.push(`<li>${renderInlineMarkdown(ordered[1])}</li>`);
        return;
      }

      closeList();
      paragraph.push(trimmed);
    });

    flushParagraph();
    closeList();
    flushTable();
    return out.join('');
  }).join('');
}

function fallbackLearningNotes() {
  return TOPICS.map(t => ({
    topic: t.key,
    label: t.label,
    quiz_topic: t.key,
    href: `content/notes/${t.key}.md`,
  }));
}

async function loadLearningManifest() {
  try {
    const res = await fetch(CONTENT_MANIFEST_URL);
    if (!res.ok) throw new Error('manifest not found');
    const data = await res.json();
    learningNotes = Array.isArray(data.notes) ? data.notes : fallbackLearningNotes();
  } catch {
    learningNotes = fallbackLearningNotes();
  }
  renderStudyTopics();
}

function stripFrontMatter(raw = '') {
  const text = String(raw).replace(/\r\n/g, '\n');
  if (!text.startsWith('---\n')) return { frontMatter: '', body: text };
  const end = text.indexOf('\n---', 4);
  if (end === -1) return { frontMatter: '', body: text };
  return {
    frontMatter: text.slice(4, end).trim(),
    body: text.slice(end + 4).replace(/^\n/, ''),
  };
}

function readMetaValue(frontMatter, key) {
  const match = frontMatter.match(new RegExp(`^${key}:\\s*(.+)$`, 'm'));
  return match ? match[1].trim().replace(/^['"]|['"]$/g, '') : '';
}

function cleanMarkdownTitle(value = '') {
  return value.replace(/`/g, '').replace(/\*\*/g, '').trim();
}

function makeSlug(value = '') {
  return value.toLowerCase()
    .replace(/[^a-z0-9가-힣]+/g, '-')
    .replace(/^-+|-+$/g, '') || 'article';
}

function firstArticleParagraph(content = '') {
  const withoutMeta = content.replace(/<!--[\s\S]*?-->/g, '').replace(/```[\s\S]*?```/g, '').trim();
  const line = withoutMeta.split('\n').map(v => v.trim()).find(v =>
    v && !v.startsWith('#') && !v.startsWith('- ') && !v.startsWith('>') && !v.startsWith('|')
  );
  return line ? line.replace(/\*\*/g, '').replace(/`/g, '').slice(0, 72) : '';
}

function parseLearningNote(raw, entry) {
  const { frontMatter, body } = stripFrontMatter(raw);
  const lines = body.split('\n');
  const parsed = {
    topic: readMetaValue(frontMatter, 'topic') || entry.topic,
    label: readMetaValue(frontMatter, 'label') || entry.label,
    quizTopic: readMetaValue(frontMatter, 'quiz_topic') || entry.quiz_topic || entry.topic,
    status: readMetaValue(frontMatter, 'status') || 'draft',
    categories: [],
    intro: [],
    href: entry.href,
  };

  let currentCategory = null;
  let currentArticle = null;

  const ensureCategory = () => {
    if (currentCategory) return currentCategory;
    currentCategory = {
      id: `${parsed.topic}-overview`,
      title: '개요',
      introLines: [],
      articles: [],
    };
    parsed.categories.push(currentCategory);
    return currentCategory;
  };

  lines.forEach(line => {
    const h1 = line.match(/^#\s+(.+)$/);
    if (h1) {
      parsed.label = parsed.label || cleanMarkdownTitle(h1[1]);
      return;
    }

    const h2 = line.match(/^##\s+(.+)$/);
    if (h2) {
      currentCategory = {
        id: `${parsed.topic}-${makeSlug(h2[1])}`,
        title: cleanMarkdownTitle(h2[1]),
        introLines: [],
        articles: [],
      };
      parsed.categories.push(currentCategory);
      currentArticle = null;
      return;
    }

    const h3 = line.match(/^###\s+(.+)$/);
    if (h3) {
      const category = ensureCategory();
      currentArticle = {
        id: `${parsed.topic}-${makeSlug(h3[1])}`,
        title: cleanMarkdownTitle(h3[1]),
        contentLines: [],
      };
      category.articles.push(currentArticle);
      return;
    }

    if (currentArticle) {
      const articleId = line.match(/<!--\s*article:\s*([a-z0-9-]+)\s*-->/i);
      if (articleId) currentArticle.id = articleId[1];
      currentArticle.contentLines.push(line);
      return;
    }

    if (currentCategory) {
      const categoryId = line.match(/<!--\s*category:\s*([a-z0-9-]+)\s*-->/i);
      if (categoryId) currentCategory.id = categoryId[1];
      currentCategory.introLines.push(line);
      return;
    }

    parsed.intro.push(line);
  });

  parsed.categories = parsed.categories
    .map(category => ({
      ...category,
      intro: category.introLines.join('\n').replace(/<!--[\s\S]*?-->/g, '').trim(),
      articles: category.articles.map(article => ({
        ...article,
        content: article.contentLines.join('\n').replace(/<!--[\s\S]*?-->/g, '').trim(),
      })),
    }))
    .filter(category => category.articles.length);

  parsed.articleCount = parsed.categories.reduce((sum, category) => sum + category.articles.length, 0);
  return parsed;
}

async function loadLearningNote(topic) {
  if (noteCache[topic]) return noteCache[topic];
  const entry = learningNotes.find(note => note.topic === topic);
  if (!entry) return null;

  try {
    const res = await fetch(entry.href);
    if (!res.ok) throw new Error('note not found');
    const text = await res.text();
    const note = parseLearningNote(text, entry);
    noteCache[topic] = note;
    return note;
  } catch {
    const note = {
      topic: entry.topic,
      label: entry.label,
      quizTopic: entry.quiz_topic || entry.topic,
      href: entry.href,
      status: 'missing',
      categories: [],
      articleCount: 0,
    };
    noteCache[topic] = note;
    return note;
  }
}

function renderStudyTopics() {
  const list = document.getElementById('studyTopicList');
  if (!list) return;
  const notes = learningNotes.length ? learningNotes : fallbackLearningNotes();
  list.innerHTML = notes.map(note => {
    const quizCount = topicCounts[note.topic] || 0;
    const cached = noteCache[note.topic];
    const articleMeta = cached && cached.articleCount ? ` · ${cached.articleCount}개 글` : '';
    return `<button class="study-row" data-study-topic="${escapeAttr(note.topic)}">
      <span>
        <span class="study-row-title">${escapeHtml(note.label)}</span>
        <span class="study-row-meta">${quizCount}문제${articleMeta}</span>
      </span>
      <span class="study-row-mark">›</span>
    </button>`;
  }).join('');

  list.querySelectorAll('[data-study-topic]').forEach(btn => {
    btn.addEventListener('click', () => openStudyTopic(btn.dataset.studyTopic));
  });
}

async function openStudyTopic(topic) {
  const note = await loadLearningNote(topic);
  currentNote = note;
  currentCategory = null;
  currentArticle = null;

  document.getElementById('studyCategoryTitle').textContent = note.label;
  document.getElementById('studyCategoryMeta').textContent = note.articleCount
    ? `${note.categories.length}개 소분류 · ${note.articleCount}개 글`
    : '정리 파일 준비 중';

  const list = document.getElementById('studyCategoryList');
  if (!note.categories.length) {
    list.innerHTML = `<div class="study-empty">
      <strong>${escapeHtml(note.href)}</strong><br>
      아직 읽을 수 있는 정리 파일이 없습니다. 콘텐츠 작업이 완료되면 이 화면에 소분류와 글 목록이 자동으로 표시됩니다.
    </div>`;
  } else {
    list.innerHTML = note.categories.map(category => `<button class="study-row" data-category-id="${escapeAttr(category.id)}">
      <span>
        <span class="study-row-title">${escapeHtml(category.title)}</span>
        <span class="study-row-meta">${category.articles.length}개 글</span>
      </span>
      <span class="study-row-mark">›</span>
    </button>`).join('');

    list.querySelectorAll('[data-category-id]').forEach(btn => {
      btn.addEventListener('click', () => openStudyCategory(btn.dataset.categoryId));
    });
  }

  showScreen('studyCategoryScreen');
}

function openStudyCategory(categoryId) {
  if (!currentNote) return;
  const category = currentNote.categories.find(item => item.id === categoryId);
  if (!category) return;
  currentCategory = category;
  currentArticle = null;

  document.getElementById('studyArticleListTitle').textContent = category.title;
  document.getElementById('studyArticleListMeta').textContent = `${currentNote.label} · ${category.articles.length}개 글`;

  const list = document.getElementById('studyArticleList');
  list.innerHTML = category.articles.map(article => {
    const preview = firstArticleParagraph(article.content);
    return `<button class="study-row" data-article-id="${escapeAttr(article.id)}">
      <span>
        <span class="study-row-title">${escapeHtml(article.title)}</span>
        <span class="study-row-meta">${escapeHtml(preview || '본문 보기')}</span>
      </span>
      <span class="study-row-mark">›</span>
    </button>`;
  }).join('');

  list.querySelectorAll('[data-article-id]').forEach(btn => {
    btn.addEventListener('click', () => openStudyArticle(btn.dataset.articleId));
  });

  showScreen('studyArticleListScreen');
}

function openStudyArticle(articleId) {
  if (!currentNote || !currentCategory) return;
  const article = currentCategory.articles.find(item => item.id === articleId);
  if (!article) return;
  currentArticle = article;

  document.getElementById('studyArticleTopTitle').textContent = currentCategory.title;
  document.getElementById('studyArticleTopMeta').textContent = currentNote.label;
  document.getElementById('studyArticleKicker').textContent = `${currentNote.label} · ${currentCategory.title}`;
  document.getElementById('studyArticleTitle').textContent = article.title;
  document.getElementById('studyArticleMeta').textContent = article.id;
  document.getElementById('studyArticleBody').innerHTML = renderMarkdown(article.content || '본문이 비어 있습니다.');

  showScreen('studyArticleScreen');
}

async function startTopicQuiz(topic) {
  if (questionLoadPromise) await questionLoadPromise;
  selectedTopics = new Set([topic]);
  selectedDiffs = new Set(['basic','intermediate','advanced']);
  selectedTypes = new Set(['concept','tradeoff','scenario','debug','ordering']);
  document.querySelectorAll('#diffFilter [data-diff], #typeFilter [data-type]').forEach(chip => chip.classList.add('active'));
  renderTopicGrid();
  updateStartBtn();
  startQuiz();
}

function startQuiz() {
  const pool = shuffle([...getFiltered()]);
  const chosen = pool.slice(0, countTarget);
  if (!chosen.length) return;
  quiz = { questions: chosen, idx: 0, correct: 0, wrongs: [], answered: false };
  showScreen('quizScreen');
  renderQuestion();
}

// ─── 문제 렌더 ───────────────────────────────────────────────────────────────
function renderQuestion() {
  const q = quiz.questions[quiz.idx];
  quiz.answered = false;

  // 진행 바
  const pct = (quiz.idx / quiz.questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('quizCounter').textContent = `${quiz.idx + 1} / ${quiz.questions.length}`;

  // 유형 배지
  const meta = TYPE_META[q.type] || { icon: '⚪', label: q.type };
  const badge = document.getElementById('typeBadge');
  badge.textContent = `${meta.icon} ${meta.label}`;
  badge.className = `chip chip-type ${q.type}`;

  document.getElementById('questionText').innerHTML = renderMarkdown(q.question);
  document.getElementById('explanationBox').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  const list = document.getElementById('optionList');
  list.innerHTML = q.options.map((opt, i) =>
    `<div class="option" data-idx="${i}">${escapeHtml(opt)}</div>`
  ).join('');

  list.querySelectorAll('.option').forEach(el => {
    el.addEventListener('click', () => selectOption(el, q));
  });
}

function selectOption(el, q) {
  if (quiz.answered) return;
  quiz.answered = true;

  const chosen = +el.dataset.idx;
  const correct = q.answer;

  document.querySelectorAll('.option').forEach(o => {
    o.classList.add('disabled');
    const i = +o.dataset.idx;
    if (i === correct) o.classList.add(chosen === correct ? 'correct' : 'reveal');
    else if (i === chosen) o.classList.add('wrong');
  });

  if (chosen === correct) quiz.correct++;
  else quiz.wrongs.push({ q, chosen });

  const box = document.getElementById('explanationBox');
  box.innerHTML = renderMarkdown(q.explanation);
  box.style.display = 'block';

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.style.display = '';
  nextBtn.textContent = quiz.idx + 1 < quiz.questions.length ? '다음 문제 →' : '결과 보기';
}

document.getElementById('nextBtn').addEventListener('click', () => {
  quiz.idx++;
  if (quiz.idx < quiz.questions.length) renderQuestion();
  else showResult();
});

document.getElementById('quitBtn').addEventListener('click', () => {
  if (quiz.idx > 0) showResult();
  else showScreen('homeScreen');
});

// ─── 결과 ────────────────────────────────────────────────────────────────────
function showResult() {
  const total = quiz.idx; // answered count
  const pct = total ? Math.round(quiz.correct / total * 100) : 0;

  document.getElementById('progressFill').style.width = '100%';

  const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚';
  const msg   = pct >= 80 ? '훌륭해요! 면접 준비 완료!' : pct >= 50 ? '좋아요! 조금만 더 연습하세요.' : '더 공부가 필요해요. 파이팅!';
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultMessage').textContent = msg;
  document.getElementById('resultPct').textContent = pct + '%';
  document.getElementById('resultScore').textContent = `${quiz.correct}/${total}`;

  // 유형별 통계
  const typeMap = {};
  quiz.questions.slice(0, total).forEach((q, i) => {
    if (!typeMap[q.type]) typeMap[q.type] = { total: 0, correct: 0 };
    typeMap[q.type].total++;
    const wrongIds = quiz.wrongs.map(w => w.q.id);
    if (!wrongIds.includes(q.id)) typeMap[q.type].correct++;
  });
  const typeList = document.getElementById('typeStatsList');
  typeList.innerHTML = Object.entries(typeMap).map(([type, s]) => {
    const p = Math.round(s.correct / s.total * 100);
    const meta = TYPE_META[type] || { icon: '⚪', label: type };
    return `<div class="type-row">
      <span style="font-size:.82rem;">${meta.icon} ${meta.label}</span>
      <div class="bar-bg"><div class="bar-fill" style="width:${p}%"></div></div>
      <span class="pct">${p}%</span>
    </div>`;
  }).join('');

  // 틀린 문제
  const wrongCard = document.getElementById('wrongCard');
  if (quiz.wrongs.length) {
    wrongCard.style.display = '';
    document.getElementById('wrongList').innerHTML = quiz.wrongs.map(({ q, chosen }) =>
      `<div class="wrong-item">
        <div class="wrong-q">${renderMarkdown(q.question)}</div>
        <div class="wrong-ans">
          <span class="correct-text">✓ ${escapeHtml(q.options[q.answer])}</span><br>
          <span class="your-text">✗ ${escapeHtml(q.options[chosen])}</span>
        </div>
      </div>`
    ).join('');
  } else {
    wrongCard.style.display = 'none';
  }

  // 통계 저장
  const s = JSON.parse(localStorage.getItem('quiz-stats') || '{"total":0,"correct":0}');
  s.total   += total;
  s.correct += quiz.correct;
  localStorage.setItem('quiz-stats', JSON.stringify(s));

  showScreen('resultScreen');
  renderStats();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

}
